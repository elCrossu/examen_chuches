services:
  app-php:
    build: .
    container_name: php_examen
    ports:
      - "7005:80"
    volumes:
      - ./src:/var/www/html 
    environment:
      DB_HOST: "db_examen"
      DB_USER: "root"
      DB_PASS: "secret"
      DB_NAME: "tienda_chuches"
    depends_on:
      - db_examen

  db_examen:
    image: mysql:8.0
    container_name: db_examen
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: tienda_chuches
    ports:
      - "7006:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql 

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma_examen
    ports:
      - "9001:80"
    environment:
      PMA_HOST: db_examen
    depends_on:
      - db_examen

volumes:
  db_data: